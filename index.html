<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITCRM</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#eef2ff;
}

/* LOGIN */
.login{
    max-width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.app{
    display:none;
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:10px;
}

h2{text-align:center;}

input, button{
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#2563eb;
    color:white;
    border:none;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

/* MOBILE */
@media(max-width:600px){
    table, thead, tbody, th, td, tr{
        display:block;
    }
    tr{margin-bottom:10px;}
}
</style>
</head>

<body>

<div class="login" id="loginBox">
    <h2>🔐 Kirish</h2>
    <input type="text" id="user" placeholder="Login"><br>
    <input type="password" id="pass" placeholder="Parol"><br>
    <button onclick="login()">Kirish</button>
</div>

<div class="app" id="appBox">
    <h2>📊 Baholash Tizimi</h2>

    <input type="text" id="name" placeholder="Ism">
    <input type="number" id="score" placeholder="Ball">
    <button onclick="add()">Qo‘shish</button>
    <button onclick="clearAll()">Tozalash</button>

    <table>
        <thead>
            <tr>
                <th>№</th>
                <th>Ism</th>
                <th>Ball</th>
                <th>Baho</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("appBox").style.display="block";
    }else{
        alert("Kirish yoki parol xato!");
    }
}

function grade(s){
    if(s>=90)return "A";
    if(s>=80)return "B";
    if(s>=70)return "C";
    if(s>=60)return "D";
    return "F";
}

let data = JSON.parse(localStorage.getItem("data")) || [];
show();

function add(){
    let name=document.getElementById("name").value;
    let score=document.getElementById("score").value;

    if(name===""||score===""){
        alert("To‘ldir!");
        return;
    }

    data.push({name,score});
    localStorage.setItem("data",JSON.stringify(data));
    show();

    document.getElementById("name").value="";
    document.getElementById("score").value="";
}

function show(){
    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((e,i)=>{
        list.innerHTML+=`
        <tr>
            <td>${i+1}</td>
            <td>${e.name}</td>
            <td>${e.score}</td>
            <td>${grade(e.score)}</td>
        </tr>`;
    });
}

function clearAll(){
    if(confirm("Hammasini o‘chirish kerakmi?")){
        data=[];
        localStorage.removeItem("data");
        show();
    }
}
</script>

</body>
</html>
