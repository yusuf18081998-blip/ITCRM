<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITCRM</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 10px; }
        
        /* JADVAL KONTEYNERI */
        .table-wrapper { 
            max-width: 100%; 
            overflow-x: auto; /* O'ngga skroll bo'lishi uchun */
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        table { border-collapse: collapse; min-width: 100%; }
        
        th, td { 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            text-align: center; 
            min-width: 100px; /* Har bir kun ustuni kengligi */
        }

        /* ISMLAR USTUNI QOTIB TURISHI UCHUN */
        .sticky-col {
            position: sticky;
            left: 0;
            background: #f1f5f9;
            z-index: 10;
            min-width: 200px;
            text-align: left;
            font-weight: bold;
        }

        th.sticky-col { background: #4f46e5; color: white; }

        .clickable { cursor: pointer; transition: 0.2s; background: #fff; }
        .clickable:hover { background: #e0e7ff; }

        .admin-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        input, button { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* LOGIN */
        .login-box { max-width: 350px; margin: 100px auto; text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="loginBox" class="login-box">
    <h2>🔐 ITCRM</h2>
    <input type="text" id="user" placeholder="Login" style="width:90%"><br><br>
    <input type="password" id="pass" placeholder="Parol" style="width:90%"><br><br>
    <button onclick="login()" style="width:100%">Kirish</button>
</div>

<div id="appBox" style="display:none">
    <div class="header">
        <h2>IT-CRM Jurnal</h2>
        <button onclick="location.reload()" style="background:#64748b">Chiqish</button>
    </div>

    <div id="adminPanel" class="admin-bar" style="display:none">
        <input type="text" id="stdName" placeholder="Yangi o'quvchi F.I.SH">
        <button onclick="addStudent()">+ O'quvchi qo'shish</button>
        <div style="border-left: 2px solid #ddd; height: 30px; margin: 0 10px;"></div>
        <button onclick="addNewDay()" style="background:#22c55e">📅 Yangi dars kuni qo'shish</button>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr id="tableHead">
                    <th class="sticky-col">O'quvchilar</th>
                    </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem("it_crm_long_std")) || [];
    let lessonDays = JSON.parse(localStorage.getItem("it_crm_long_days")) || [];
    let currentUser = null;

    function login() {
        let u = document.getElementById("user").value;
        let p = document.getElementById("pass").value;
        if(u === "admin" && p === "2013") {
            currentUser = "admin";
            document.getElementById("adminPanel").style.display = "flex";
        } else {
            let s = students.find(x => x.login === u && x.pass === p);
            if(s) currentUser = "student";
            else return alert("Xato!");
        }
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("appBox").style.display = "block";
        renderJournal();
    }

    function addStudent() {
        let name = document.getElementById("stdName").value;
        if(!name) return;
        // O'quvchi uchun barcha dars kunlariga bo'sh baho yaratamiz
        let scores = new Array(lessonDays.length).fill("");
        students.push({ name, scores });
        save();
        renderJournal();
        document.getElementById("stdName").value = "";
    }

    function addNewDay() {
        const d = new Date();
        const days = ["Ya", "Du", "Se", "Cho", "Pa", "Ju", "Sh"];
        let dayStr = `${d.getDate()}.${d.getMonth()+1} (${days[d.getDay()]})`;
        
        lessonDays.push(dayStr);
        // Hamma o'quvchilarga yangi dars uchun bo'sh joy ochamiz
        students.forEach(s => s.scores.push(""));
        save();
        renderJournal();
    }

    function editScore(sIdx, dIdx) {
        if(currentUser !== "admin") return;
        let val = prompt(`${students[sIdx].name} uchun baho (%) kiriting:`, students[sIdx].scores[dIdx]);
        if(val !== null) {
            students[sIdx].scores[dIdx] = val;
            save();
            renderJournal();
        }
    }

    function renderJournal() {
        const head = document.getElementById("tableHead");
        const body = document.getElementById("tableBody");

        // Sarlavhani chizish
        head.innerHTML = `<th class="sticky-col">O'quvchilar</th>`;
        lessonDays.forEach(day => {
            head.innerHTML += `<th>${day}</th>`;
        });

        // Tanani chizish
        body.innerHTML = "";
        students.forEach((s, sIdx) => {
            let row = `<tr><td class="sticky-col">${s.name}</td>`;
            s.scores.forEach((score, dIdx) => {
                row += `<td class="clickable" onclick="editScore(${sIdx}, ${dIdx})">${score ? score + '%' : '-'}</td>`;
            });
            row += `</tr>`;
            body.innerHTML += row;
        });
    }

    function save() {
        localStorage.setItem("it_crm_long_std", JSON.stringify(students));
        localStorage.setItem("it_crm_long_days", JSON.stringify(lessonDays));
    }
</script>

</body>
</html>
