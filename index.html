<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-CRM</title>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .login-box { max-width: 350px; margin: 100px auto; text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h2 { color: #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { font-size: 14px; background: #e0e7ff; color: #4338ca; padding: 5px 15px; border-radius: 20px; }

        .admin-controls { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        th { background: #f8fafc; font-size: 13px; color: #64748b; }

        .clickable { cursor: pointer; transition: 0.2s; position: relative; }
        .clickable:hover { background: #f0f9ff; border: 2px solid var(--primary); }
        .clickable:empty::after { content: "➕"; opacity: 0.3; }

        .percent-badge { padding: 4px 8px; border-radius: 6px; color: white; font-weight: bold; font-size: 14px; }
        .p-high { background: var(--success); }
        .p-mid { background: var(--warning); }
        .p-low { background: var(--danger); }

        input, button { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-exit { background: #64748b; font-size: 12px; }

        /* Modal styling */
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:15px; box-shadow: 0 0 50px rgba(0,0,0,0.3); z-index:100; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:99; }
    </style>
</head>
<body>

<div id="loginBox" class="login-box">
    <h2>🔐 ITCRM</h2>
    <input type="text" id="user" placeholder="Login" style="width:90%"><br><br>
    <input type="password" id="pass" placeholder="Parol" style="width:90%"><br><br>
    <button onclick="login()" style="width:100%">Kirish</button>
</div>

<div id="appBox" class="container" style="display:none">
    <h2>
        <div>📊 Baholash Paneli <span class="status-bar" id="currentDateDisplay"></span></div>
        <button class="btn-exit" onclick="location.reload()">Chiqish</button>
    </h2>

    <div id="adminPanel" class="admin-controls" style="display:none">
        <input type="text" id="stdName" placeholder="F.I.SH (Yangi o'quvchi)">
        <input type="text" id="stdLogin" placeholder="Login">
        <input type="text" id="stdPass" placeholder="Parol">
        <button onclick="addStudent()">O'quvchini qo'shish</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; width: 250px;">O'quvchi F.I.SH</th>
                    <th>Dushanba</th>
                    <th>Chorshanba</th>
                    <th>Juma</th>
                    <th>O'rtacha (%)</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="scoreModal">
    <h3 id="modalTitle">Baho qo'yish</h3>
    <p>Foizni kiriting (0-100):</p>
    <input type="number" id="tempScore" min="0" max="100" style="width:100px; font-size: 20px; text-align: center;"> %
    <br><br>
    <button onclick="saveScore()" style="width:100%">Saqlash</button>
</div>

<script>
    let students = JSON.parse(localStorage.getItem("it_crm_v3_students")) || [];
    let currentUser = null;
    let activeStudentIndex = null;
    let activeDayIndex = null;

    // Sanani va kunni aniqlash
    const days = ["Yakshanba", "Dushanba", "Seshanba", "Chorshanba", "Payshanba", "Juma", "Shanba"];
    const now = new Date();
    const dateStr = `${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()} | ${days[now.getDay()]}`;
    document.getElementById("currentDateDisplay").innerText = dateStr;

    function login() {
        let u = document.getElementById("user").value;
        let p = document.getElementById("pass").value;

        if(u === "admin" && p === "2013") {
            currentUser = { role: "admin" };
            document.getElementById("adminPanel").style.display = "flex";
        } else {
            let found = students.find(s => s.login === u && s.pass === p);
            if(found) currentUser = { role: "student", ...found };
            else return alert("Xato!");
        }
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("appBox").style.display = "block";
        renderTable();
    }

    function addStudent() {
        let name = document.getElementById("stdName").value;
        let login = document.getElementById("stdLogin").value;
        let pass = document.getElementById("stdPass").value;
        if(!name || !login || !pass) return alert("To'ldiring!");

        students.push({ name, login, pass, scores: [null, null, null] }); // Du, Cho, Ju uchun
        saveData();
        renderTable();
        document.getElementById("stdName").value = "";
    }

    function openScoreModal(sIdx, dIdx) {
        if(currentUser.role !== 'admin') return; // O'quvchi o'ziga baho qo'ya olmaydi
        activeStudentIndex = sIdx;
        activeDayIndex = dIdx;
        document.getElementById("modalTitle").innerText = `${students[sIdx].name} - Baholash`;
        document.getElementById("tempScore").value = students[sIdx].scores[dIdx] || "";
        document.getElementById("scoreModal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    }

    function saveScore() {
        let val = parseInt(document.getElementById("tempScore").value);
        if(val >= 0 && val <= 100) {
            students[activeStudentIndex].scores[activeDayIndex] = val;
            saveData();
            renderTable();
            closeModal();
        } else {
            alert("0 dan 100 gacha son kiriting!");
        }
    }

    function closeModal() {
        document.getElementById("scoreModal").style.display = "none";
        document.getElementById("overlay").style.display = "none";
    }

    function renderTable() {
        let body = document.getElementById("studentTableBody");
        body.innerHTML = "";

        students.forEach((s, sIdx) => {
            // O'quvchi faqat o'zini ko'rsin
            if(currentUser.role === 'student' && s.login !== currentUser.login) return;

            let total = 0;
            let count = 0;
            s.scores.forEach(v => { if(v !== null) { total += v; count++; } });
            let avg = count > 0 ? Math.round(total / count) : 0;
            let colorClass = avg >= 80 ? 'p-high' : (avg >= 60 ? 'p-mid' : 'p-low');

            body.innerHTML += `
                <tr>
                    <td style="text-align: left; font-weight: bold;">${s.name}</td>
                    <td class="clickable" onclick="openScoreModal(${sIdx}, 0)">${s.scores[0] !== null ? s.scores[0] + '%' : ''}</td>
                    <td class="clickable" onclick="openScoreModal(${sIdx}, 1)">${s.scores[1] !== null ? s.scores[1] + '%' : ''}</td>
                    <td class="clickable" onclick="openScoreModal(${sIdx}, 2)">${s.scores[2] !== null ? s.scores[2] + '%' : ''}</td>
                    <td><span class="percent-badge ${colorClass}">${avg}%</span></td>
                </tr>
            `;
        });
    }

    function saveData() {
        localStorage.setItem("it_crm_v3_students", JSON.stringify(students));
    }
</script>

</body>
</html>
